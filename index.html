<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apocalipsis: Sobrevive</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
margin:0;
}

#game{
max-width:600px;
padding:30px;
background:#1a1a1a;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
display:block;
margin:10px auto;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4d4d;
color:white;
}

button:hover{
background:#ff1a1a;
}

</style>
</head>

<body>

<div id="game">

<h2 id="story">
Despiertas en una ciudad abandonada. Hay silencio… demasiado silencio.
</h2>

<div id="choices"></div>

</div>

<script>

const story = {
start: {
text: "Despiertas en una ciudad abandonada. Ves una tienda y una calle oscura.",
choices: [
{ text:"Entrar a la tienda", next:"store" },
{ text:"Caminar por la calle", next:"street" }
]
},

store: {
text:"Dentro de la tienda escuchas ruidos detrás del mostrador.",
choices:[
{ text:"Investigar el ruido", next:"zombie" },
{ text:"Tomar comida y salir rápido", next:"food" }
]
},

street:{
text:"La calle está vacía, pero ves un coche abandonado.",
choices:[
{ text:"Revisar el coche", next:"car" },
{ text:"Seguir caminando", next:"horde" }
]
},

zombie:{
text:"¡Un zombie salta hacia ti! No logras escapar.",
choices:[
{ text:"Reiniciar", next:"start" }
]
},

food:{
text:"Encuentras comida y una linterna. Ahora tienes más posibilidades de sobrevivir.",
choices:[
{ text:"Salir a la calle", next:"street" }
]
},

car:{
text:"Encuentras las llaves dentro del coche.",
choices:[
{ text:"Encender el coche", next:"escape" },
{ text:"Seguir buscando", next:"zombie" }
]
},

horde:{
text:"Una horda aparece de la nada… no puedes escapar.",
choices:[
{ text:"Reiniciar", next:"start" }
]
},

escape:{
text:"Logras arrancar el coche y escapar de la ciudad. Sobreviviste.",
choices:[
{ text:"Jugar otra vez", next:"start" }
]
}

}

function showScene(scene){
const current = story[scene]

document.getElementById("story").innerText = current.text

const choicesDiv = document.getElementById("choices")
choicesDiv.innerHTML=""

current.choices.forEach(choice=>{
let btn=document.createElement("button")
btn.innerText=choice.text
btn.onclick=()=>showScene(choice.next)
choicesDiv.appendChild(btn)
})
}

showScene("start")

</script>

</body>
</html>
