<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Me perdonas?</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(135deg,#ffd6e7,#fff0f7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

.photo{
width:220px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
margin-bottom:20px;
animation:fadeIn 1.5s ease;
}

h1{
color:#ff2e7a;
font-size:40px;
animation:fadeIn 1s ease;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
margin:15px;
cursor:pointer;
transition:transform .2s;
}

button:hover{
transform:scale(1.1);
}

#siButton{
background:#ff4da6;
color:white;
}

#noButton{
background:#ffc2dd;
color:black;
position:absolute;
}

#message{
display:none;
font-size:30px;
color:#ff2e7a;
margin-top:20px;
animation:pop 1s ease forwards;
}

#extra{
display:none;
font-size:20px;
margin-top:10px;
color:#444;
}

.heart{
position:absolute;
color:#ff4da6;
font-size:20px;
animation:float 6s linear infinite;
}

.bigHeart{
position:absolute;
font-size:30px;
color:#ff2e7a;
animation:explode 1.5s ease forwards;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(2) translateY(-200px);opacity:0;}
}

@keyframes pop{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>

</head>

<body>

<img src="foto.jpg" class="photo">

<h1 id="title">Keeyla mi niña hermosa ¿Me perdonas? 💗</h1>

<div id="buttons">
<button id="siButton" onclick="showLove()">Sí</button>
<button id="noButton" onmouseover="moveButton()">No</button>
</div>

<div id="message">
¡MUCHAS GRACIAS MI PRINCESA LINDA! 💕
</div>

<div id="extra">
muchas gaashiash mi amor te amo mucho mucho  
perdón por todo  
te amo infinitas veces 💗
</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0c5aeb8c7e.mp3?filename=romantic-love-ambient-110111.mp3" type="audio/mpeg">
</audio>

<script>

function showLove(){

document.getElementById("buttons").style.display="none";
document.getElementById("title").style.display="none";

document.getElementById("message").style.display="block";
document.getElementById("extra").style.display="block";

explodeHearts();
startHearts();

}

function moveButton(){

let btn=document.getElementById("noButton");

let x=Math.random()*window.innerWidth*0.8;
let y=Math.random()*window.innerHeight*0.8;

btn.style.left=x+"px";
btn.style.top=y+"px";

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},300);

}

function explodeHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");
heart.className="bigHeart";
heart.innerHTML="❤";

heart.style.left=(window.innerWidth/2)+"px";
heart.style.top=(window.innerHeight/2)+"px";

heart.style.transform="rotate("+Math.random()*360+"deg)";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1500);

}

}

</script>

</body>
</html>
